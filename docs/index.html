<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>515TEAM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #ffffff;
            color: #333333;
            line-height: 1.5;
        }

        /* Навигационная панель */
        .navbar {
            background-color: #333333;
            padding: 1rem 2rem;
            border-bottom: 1px solid #cccccc;
        }

        .navbar a {
            color: #ffffff;
            text-decoration: none;
            margin-right: 1.5rem;
            font-size: 0.9rem;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 0.8rem;
        }

        .logo a {
            margin-right: 0;
        }

        .nav-links {
            margin-top: 0.5rem;
        }

        /* Основной контент */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Заголовки */
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: normal;
        }

        h2 {
            font-size: 1.3rem;
            margin: 1.5rem 0 0.8rem 0;
            font-weight: normal;
            border-bottom: 1px solid #eeeeee;
            padding-bottom: 0.3rem;
        }

        /* Кнопки */
        .button-group {
            margin: 1.5rem 0;
        }

        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            background-color: #0066cc;
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #0066cc;
            margin-right: 1rem;
            font-size: 0.9rem;
        }

        .btn-secondary {
            background-color: #666666;
            border-color: #666666;
        }

        .btn:hover {
            background-color: #0055aa;
        }

        .btn-secondary:hover {
            background-color: #555555;
        }

        /* Список ссылок */
        .links-list {
            margin-top: 1.5rem;
        }

        .link-item {
            display: block;
            padding: 0.6rem 0;
            border-bottom: 1px solid #eeeeee;
            text-decoration: none;
            color: #0066cc;
        }

        .link-item:hover {
            text-decoration: underline;
        }

        /* Страница глоссария */
        .term {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eeeeee;
        }

        .term-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #333333;
        }

        .term-description {
            color: #555555;
        }

        .term-description ul {
            margin-top: 0.5rem;
            margin-left: 1.5rem;
        }

        code {
            background-color: #f5f5f5;
            padding: 0.2rem 0.3rem;
            font-family: monospace;
            font-size: 0.9rem;
        }

        /* Футер */
        .footer {
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
            border-top: 1px solid #eeeeee;
            color: #888888;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <!-- Навигационная панель -->
    <div class="navbar">
        <div class="logo">

        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="glossary.html">Глоссарий</a>
            <a href="#">Дополнительная спецификация</a>

            <a href="#">Схема базы данных</a>
            <a href="#">Функциональные требования</a>
            <a href="#">Итоги изучения курса</a>
        </div>
    </div>

    <div class="container">
        <h1>Lab4 created by 515team</h1>
        
        <div class="button-group">
            <a href="https://github.com/fpmi-tpmp2026/tpmp-gr13a-lab4-515team" class="btn">Репозиторий с Wiki</a>
            <a href="https://github.com/hhlbby/515team_code" class="btn btn-secondary">Репозиторий с кодом</a>
        </div>
    </div>

    <div class="footer">
        <p>2025 515TEAM | Учебный проект</p>
    </div>
</body>
</html>
